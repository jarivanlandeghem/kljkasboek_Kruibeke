services:
  klj-portaal-backend:
    container_name: klj-portaal-backend
    image: klj-portaal-backend
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      PORT: "3000"
      CORS_ORIGINS: "[\"http://localhost:5173\", \"http://localhost\"]"
      CORS_MAX_AGE: 10800
      DATABASE_URL: mysql://devusr:devpwd@host.docker.internal:3306/kirhanhuyghe #budget of kirhanhuyghe??
      # DATABASE_URL: mysql://devusr:devpwd@db:3306/kirhanhuyghe
      AUTH_JWT_SECRET: eensuperveiligsecretvoorindevelopment
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy


